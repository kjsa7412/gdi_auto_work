      required: false
      row: 1
      gravity: 1
    - field_id: "P_rsch_ctg_cd"
      label: "연구분류"
      type: "CODE_HELP"
      code_type: "RP010"
      required: false
      row: 1
      gravity: 1
    - field_id: "P_rsch_cls_cd"
      label: "연구유형"
      type: "CODE_HELP"
      code_type: "RP020"
      required: false
      row: 1
      gravity: 1
    - field_id: "P_prj_nm"
      label: "연구과제명"
      type: "TEXT"
      required: false
      row: 1
      gravity: 2
