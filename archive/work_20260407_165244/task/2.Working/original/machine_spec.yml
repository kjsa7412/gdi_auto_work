      header: "접수일자"
      data_type: "string"
      width: 100
      sortable: true
      align: "center"
    - column_id: "prgrs_stat_nm"
      header: "검토상태"
      data_type: "string"
      width: 100
      sortable: true
      align: "center"
      code_type: "RP070"
    - column_id: "opl_wrt_dt"
      header: "의견서작성일"
      data_type: "string"
      width: 100
      sortable: true
      align: "center"

