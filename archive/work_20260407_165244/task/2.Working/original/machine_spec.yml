      type: "DATE"
      required: false
      row: 2
      gravity: 1
  grid_columns:
    - column_id: "rsch_cls_nm"
      header: "연구유형"
      data_type: "string"
      width: 100
      sortable: true
      align: "center"
      code_type: "RP020"
    - column_id: "prj_nm"
      header: "연구과제명"
      data_type: "string"
      width: 300
      sortable: true
      align: "left"
