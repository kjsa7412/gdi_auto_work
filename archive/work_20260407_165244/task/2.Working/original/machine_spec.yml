delete_sql_id: "deletePreRviewMst"

artifacts:
  html_path: "work/task/2.Working/generated/SEB010.html"
  xml_path: "work/task/2.Working/generated/seb010.xml"

controller: "com.sjinc.proj.se.seb.seb010.Seb010Controller"
service: "com.sjinc.proj.se.seb.seb010.Seb010Service"

popup_targets:
  - popup_id: "SEB011"
    trigger_field: "grid_dblclick"
    return_fields:
      - "wrk_mast_id"
  - popup_id: "SEB011"
    trigger_field: "btn_new"
    return_fields: []

