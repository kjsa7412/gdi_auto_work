# =============================================================================
# framework_manifest.yml
# 프레임워크 분석 결과 종합 매니페스트
# 근거: C:\gdi\src\main 전체 구조 + FERP dt 모듈 레퍼런스 분석
# =============================================================================

framework:
  id: "gdi-ferp-framework"
  name: "GDI FERP Backoffice Framework"
  version: "1.0"
  base_package: "com.sjinc"

  source_roots:
    java: "src/main/java/com/sjinc"
    resources: "src/main/resources"
    templates: "src/main/resources/templates"
    mappers: "src/main/resources/mapper"
    static_assets: "src/main/resources/static/assets"

  packages:
    framework: "com.sjinc.frame"
    project_base: "com.sjinc.proj.base"
    project_common: "com.sjinc.proj.common"
    project_modules: "com.sjinc.proj"

  # {sub_group}은 3자리 코드 (module_group + sub_letter). 예: se+b=seb, dt+a=dta
  supported_artifacts:
    - type: "controller"
      extension: ".java"
      location: "src/main/java/com/sjinc/proj/{module_group}/{sub_group}/{module_id}/"
      naming: "{ModuleId}Controller.java"
      mandatory: false

    - type: "service"
      extension: ".java"
      location: "src/main/java/com/sjinc/proj/{module_group}/{sub_group}/{module_id}/"
      naming: "{ModuleId}Service.java"
      mandatory: false

    - type: "xml_mapper"
      extension: ".xml"
      location: "src/main/resources/mapper/sjerp/{module_group}/{sub_group}/"
      naming: "{module_id}.xml"
      mandatory: true

    - type: "html_template"
      extension: ".html"
      location: "src/main/resources/templates/project/{module_group}/{sub_group}/"
      naming: "{MODULE_ID}.html"
      mandatory: true

  mandatory_artifacts:
    - "xml_mapper"
    - "html_template"

  optional_artifacts:
    - "controller"
    - "service"

  supported_screen_types:
    - "list"
    - "list-detail"
    - "form"
    - "popup"

  naming_reference: "system/config/naming.yml"

  pattern_references:
    controller: "system/policies/framework/controller_patterns.yml"
    service: "system/policies/framework/service_patterns.yml"
    xml_mapper: "system/policies/framework/xml_patterns.yml"
    html_template: "system/policies/framework/html_patterns.yml"
    layout: "system/policies/framework/layout_rules.yml"
    forbidden: "system/policies/framework/forbidden_apis.yml"
    template_selection: "system/policies/framework/template_selection.yml"
    skeleton_contract: "system/policies/framework/skeleton_contract.yml"

  skeleton_required: true
  skeleton_contract_reference: "system/policies/framework/skeleton_contract.yml"

  convention_priority: true
  convention_cache_path: "system/cache/convention/"

  framework_source_fallback:
    description: "정책이나 cache에서 구현 방법을 찾을 수 없을 때 프레임워크 소스 코드를 직접 확인"
    applies_to: ["build", "fix"]
    priority: "정책 → convention cache → 프레임워크 소스 → 에이전트 판단(최후 수단)"
    source_roots:
      framework:
        path: "C:/gdi/src/main"
        description: "GDI 프레임워크 전체 (Java, Resources, Templates, Static)"
        includes:
          java: "java/com/sjinc/**/*.java"
          templates: "resources/templates/**/*.html"
          mappers: "resources/mapper/**/*.xml"
          help: "resources/mapper/sjerp/help/*.xml"
          static_js: "resources/static/assets/js/**/*.js"
      reference_java:
        path: "C:/GitLap/FERP/FERP(TOBE)/ferp-backoffice/src/main/java/com/sjinc/sjerp/proj/dt"
        description: "레퍼런스 Controller/Service — dt 모듈 전체 (31개 Java 파일)"
      reference_xml:
        path: "C:/GitLap/FERP/FERP(TOBE)/ferp-backoffice/src/main/resources/mapper/sjerp/dt"
        description: "레퍼런스 XML Mapper — dt 모듈 전체 (97개 XML 파일)"
      reference_html:
        path: "C:/GitLap/FERP/FERP(TOBE)/ferp-backoffice/src/main/resources/templates/project/dt"
        description: "레퍼런스 HTML Template — dt 모듈 전체 HTML 템플릿"
    lookup_order:
      - "1. framework (GDI 프레임워크) — 현재 프로젝트의 실제 구현"
      - "2. reference_html/xml/java (FERP dt 레퍼런스) — 검증된 패턴 참조"
      - "3. framework > reference 불일치 시 framework 우선"
    trigger_condition: >
      다음 상황에서 프레임워크 소스 참조를 수행한다:
      1. 정책 파일(system/policies/**)에 해당 구현 패턴이 정의되어 있지 않을 때
      2. convention cache에서 필요한 정보를 찾을 수 없을 때
      3. 구현해야 하는 UI 컴포넌트/이벤트/API 호출 방식이 불확실할 때
      4. 에이전트가 추론한 구현 방식의 정확성을 검증해야 할 때
    procedure:
      - step: 1
        action: "정책 파일 확인"
        detail: "system/policies/framework/*.yml에서 해당 패턴 검색"
      - step: 2
        action: "convention cache 확인"
        detail: "system/cache/convention/*.txt에서 테이블/코드/함수 정보 검색"
      - step: 3
        action: "프레임워크 소스 검색"
        detail: >
          Grep 도구로 프레임워크 소스에서 관련 키워드를 검색한다.
          예: 더블클릭 구현법 → grep 'dblclick' templates/project/**/*.html
          예: 파일 업로드 → grep 'fileMulti\|saveFile' templates/project/**/*.html
          예: 커스텀 코드헬프 → grep 'DATA_CODE_TYPE.custom' templates/project/**/*.html
      - step: 4
        action: "패턴 검증"
        detail: "최소 2개 이상 파일에서 동일 패턴이 사용되는지 확인. 1개만 있으면 실험적 패턴일 수 있으므로 주의"
      - step: 5
        action: "구현 적용 + 정책 반영"
        detail: "확인된 패턴을 코드에 적용하고, 해당 패턴을 정책 파일에 추가하여 재발 방지"
    rules:
      - "build/fix 모두에서 정책 미비 시 프레임워크 소스를 직접 검색하여 정답을 찾는다"
      - "확인된 패턴은 반드시 정책에 반영하여 동일 문제 재발을 방지한다"
      - "프레임워크 소스 참조 시 최소 2개 이상 파일에서 동일 패턴 확인 후 채택"
      - "에이전트 추론만으로 구현하지 않는다 — 반드시 실제 소스에서 검증 후 적용"

  unresolved_policy:
    action: "block_and_report"
    description: "미해결 항목 발견 시 생성 중단 후 보고서에 명시"
    allowed_placeholders: false

  tech_stack:
    language: "Java"
    jdk_version: "17+"
    framework: "Spring Boot"
    template_engine: "Thymeleaf"
    orm: "MyBatis"
    database: "PostgreSQL"
    connection_pool: "HikariCP"
    frontend_ui: "Webix"
    css_framework: "Bootstrap 5"
    js_library: "jQuery"

  base_classes:
    controller: "com.sjinc.proj.base.BaseController"
    service: "com.sjinc.proj.base.BaseService"
    parameter: "com.sjinc.proj.base.BaseParm"
    parameter_all: "com.sjinc.proj.base.BaseParmAll"
    response: "com.sjinc.proj.base.BaseResponse"
    result_code: "com.sjinc.proj.base.ResultCode"
    login_user: "com.sjinc.proj.login.LoginUserVo"

  common_services:
    data_access: "com.sjinc.proj.common.CommonService"
    data_controller: "com.sjinc.proj.common.CommonController"
    file_service: "com.sjinc.proj.file.FileService"
    log_service: "com.sjinc.frame.service.FrameLogService"

  common_endpoints:
    select_list: "/common/select"
    select_one: "/common/selectOne"
    select_list_w: "/common/selectW"
    select_one_w: "/common/selectOneW"
    select_pager: "/common/selectPager"
    save: "/common/save"
    save_list: "/common/saveList"
    save_all: "/common/saveAll"
    procedure: "/common/procedure"
    upload: "/common/upload"
    download: "/common/download"

  ui_entry:
    controller: "com.sjinc.proj.ui.UiController"
    page_entry: "/ui"
    modal_entry: "/view"
    model_attributes:
      - "PGM"
      - "PGM_INFO"
      - "PGM_AUTH"
      - "PARAM"

  annotations:
    add_user_info: "com.sjinc.frame.annotation.AddUserInfo"
    log_action: "com.sjinc.frame.annotation.LogAction"

  frontend_js:
    platform: "platformForm.js, platformUtil.js"
    http_client: "httpclient.js"
    ui_components: "ui.js"
    utilities: "utils.js"
    frame: "frame.js"
    popup: "popup.js"
    loading: "loading.js"
    pagination: "pagenavi.js"
    key_util: "keyUtil.js"
    local_storage: "localStorageUtil.js"
    excel: "excel.worker.js"
    webix_custom: "webix.custom.js, webix.custom2.js, webix.custom3.js"
