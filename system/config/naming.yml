# =============================================================================
# naming.yml
# 네이밍 규칙 정의서
# 근거: GDI 프레임워크 + FERP dt 모듈 레퍼런스 분석
# =============================================================================

module_id:
  description: "화면/프로그램 단위 식별자"
  pattern: "{module_group}{sub_letter}{seq}"
  examples: ["dta030", "syb020", "dtj010", "seb020"]
  rules:
    - type: "강제"
      rule: "영문 소문자 + 숫자 조합"
    - type: "강제"
      rule: "모듈그룹 2자리 + 서브그룹 1자리(영문) + 일련번호 3자리(숫자)"
    - type: "관행"
      rule: "일련번호는 010 단위로 증가"
  근거: "C:/gdi/src/main/java/com/sjinc/proj/sy/syb/syb020/, C:/GitLap/FERP/FERP(TOBE)/ferp-backoffice/.../dt/dta/dta030/"

sub_group:
  description: "디렉토리 경로에서 사용하는 서브그룹 식별자 (3자리)"
  pattern: "{module_group}{sub_letter}"
  derivation: "module_id 앞 3자리 = module_group(2) + sub_letter(1)"
  examples:
    - module_id: "dta030" → sub_group: "dta"
    - module_id: "syb020" → sub_group: "syb"
    - module_id: "seb020" → sub_group: "seb"
  rules:
    - type: "강제"
      rule: "디렉토리 경로에서 sub_group은 반드시 3자리 코드 사용 (단일 문자 금지)"
    - type: "강제"
      rule: "예: templates/project/se/seb/ (O), templates/project/se/b/ (X)"

controller:
  class_name:
    pattern: "{ModuleId}Controller"
    case: "PascalCase"
    examples: ["Dta030Controller", "DtController"]
    rules:
      - type: "강제"
        rule: "반드시 Controller 접미사"
      - type: "강제"
        rule: "모듈ID PascalCase 변환"
      - type: "관행"
        rule: "모듈그룹 공통은 {ModuleGroup}Controller"
    근거: "Dta030Controller.java, DtController.java"

service:
  class_name:
    pattern: "{ModuleId}Service"
    case: "PascalCase"
    examples: ["Dta030Service", "DtService"]
    rules:
      - type: "강제"
        rule: "반드시 Service 접미사"
      - type: "강제"
        rule: "인터페이스/구현체 분리 안 함"
    근거: "Dta030Service.java, Dtc010Service.java"

request_mapping:
  class_level:
    pattern: "/{module_id}"
    examples: ["@RequestMapping(\"/dta030\")", "@RequestMapping(\"/dtc010\")"]
    rules:
      - type: "강제"
        rule: "모듈ID 소문자 그대로"
      - type: "강제"
        rule: "클래스 레벨 @RequestMapping 설정"
    예외: ["DtController: /dt (모듈그룹 공통)", "CommonController: 클래스 레벨 없음"]
  method_level:
    pattern: "/{action}"
    method: "RequestMethod.POST"
    examples: ["/uploadExcel", "/validation", "/insertReqDstbt", "/saveAll"]
    rules:
      - type: "강제"
        rule: "POST만 사용"
      - type: "관행"
        rule: "camelCase action명"
      - type: "관행"
        rule: "접두사: select/insert/update/delete/upload/save/validation"

html:
  file_name:
    pattern: "{SCREEN_ID}.html"
    case: "대문자"
    examples:
      main: "SEA010.html"
      sub: "SEA011.html"
      tab: "SEB012.html"
    rules:
      - type: "강제"
        rule: "화면ID(screen_id) 대문자 변환"
      - type: "강제"
        rule: "서브화면/팝업/탭도 독립 screen_id로 파일 생성 (예: SEA011.html)"
      - type: "폐기"
        rule: "_P{seq}.html, _T{seq}.html 접미사 패턴은 사용하지 않음. 모든 화면은 PPT 프로그램ID 기준으로 독립 파일 생성"
    location: "templates/project/{module_group}/{sub_group}/"
    근거: "sy_pgm_info.pgm_path 분석: 서브화면도 독립 경로 사용 (/se/sea/sea011 등)"

xml_mapper:
  file_name:
    pattern: "{screen_id_lower}.xml"
    case: "소문자"
    examples: ["sea010.xml", "sea011.xml", "seb010.xml"]
    rules:
      - type: "강제"
        rule: "각 화면(screen_id)별 독립 XML mapper 파일 생성"
      - type: "강제"
        rule: "서브화면도 독립 XML — 부모와 공유하지 않음"
      - type: "폐기"
        rule: "부모 module_id에 서브화면 SQL을 합치는 방식은 사용하지 않음"
    location: "mapper/sjerp/{module_group}/{sub_group}/"
    근거: "sy_pgm_info.pgm_path 분석: 각 screen_id가 독립 경로 사용"

namespace:
  pattern: "{screen_id_lower}"
  rules:
    - type: "강제"
      rule: "mapper namespace는 화면ID 소문자와 동일 (예: sea011)"
    - type: "강제"
      rule: "1 파일 = 1 namespace = 1 screen_id"
  근거: "각 화면의 독립 관리 원칙"

sql_id:
  pattern: "{action}{Description}"
  case: "camelCase"
  prefixes:
    select: "조회"
    insert: "등록/수정(upsert)"
    update: "수정"
    delete: "삭제"
  examples: ["selectDstbtPrdt", "insertData", "deleteDstbt", "updateSizeMovPnltyIndcDtl"]
  rules:
    - type: "강제"
      rule: "select/insert/update/delete 접두사"
    - type: "관행"
      rule: "목록: select{Subject}List 또는 selectMainGrid"
    - type: "관행"
      rule: "페이징 카운트: {sqlId}Count"
  statement_reference: "프론트에서 namespace.sqlId (예: dta030.selectDstbtPrdt)"

program_id:
  pattern: "{MODULE_ID}"
  case: "대문자"
  examples: ["DTA030", "DTJ010"]
  rules:
    - type: "강제"
      rule: "UiController /ui 엔드포인트에서 pgm_id로 전달"
    - type: "강제"
      rule: "Thymeleaf PGM 변수로 HTML 내 ID prefix 사용"
  근거: "UiController.java - model.addAttribute(\"PGM\", pgm.get(\"pgm_id\"))"

java_package:
  pattern: "com.sjinc.proj.{module_group}.{sub_group}.{module_id}"
  example: "com.sjinc.proj.dt.dta.dta030"
  rules:
    - type: "강제"
      rule: "com.sjinc.proj 하위"
    - type: "강제"
      rule: "Controller와 Service는 같은 패키지"

database:
  table_name:
    pattern: "{prefix}_{description}"
    case: "snake_case"
    prefixes: ["sy_", "sm_", "dt_", "ps_", "ss_"]
  view_name:
    pattern: "vw_{description}"
  function_name:
    pattern: "fn_{prefix}_{description}"
    examples: ["fn_ps_get_brndz_nm", "fn_sy_get_code_nm"]
  stored_procedure:
    pattern: "sp_{description}"
  audit_columns:
    - "firs_reg_pgm_id"
    - "firs_reg_dts"
    - "firs_reg_user_id"
    - "firs_reg_ip"
    - "fina_reg_pgm_id"
    - "fina_reg_dts"
    - "fina_reg_user_id"
    - "fina_reg_ip"

parameters:
  search_prefix: "P_"
  login_prefix: "login_"
  examples:
    search: ["P_brndz_cd", "P_brnd_cd", "P_start_dt", "P_end_dt"]
    login: ["login_comp_cd", "login_emp_no", "login_user_id", "login_user_ip"]
  rules:
    - type: "강제"
      rule: "검색 조건은 P_ 접두사"
    - type: "강제"
      rule: "로그인 정보는 login_ 접두사 (@AddUserInfo AOP 자동 주입)"
    - type: "관행"
      rule: "저장 데이터는 접두사 없이 컬럼명 그대로"
