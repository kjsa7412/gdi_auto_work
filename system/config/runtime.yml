version: 1

mode:
  workspace_model: "single-active"
  allow_parallel_task_and_fix: false
  archive_readable: true
  archive_as_runtime_input: false

guards:
  require_lock_file: true
  require_active_context: true
  fail_if_task_and_fix_both_populated: true
  fail_if_archive_referenced_as_input: true

cache:
  path: "system/cache/convention/"
  principle: "cache-first"
  refresh_commands: ["analyze", "cache-refresh"]
  analyze_refresh: "analyze 시작 시 무조건 1회 수행"
  standalone_refresh: "/cache-refresh command로 독립 실행 가능"
  read_only_commands: ["build", "fix"]
  db_fallback: "cache-first 후 부족 시에만 허용 (모든 command)"
  policy: "system/policies/runtime/db_access.yml"
  terminology:
    cache_hit: "필요한 정보가 cache에서 충분히 확인된 상태"
    cache_miss: "필요한 항목이 cache에 전혀 존재하지 않는 상태"
    cache_insufficient: "일부 존재하지만 판단에 필요한 수준으로 충분하지 않은 상태"
    cache_mismatch: "cache 정보와 분석/생성 대상 구조가 충돌하는 상태"
    db_fallback: "cache miss/insufficient/mismatch를 해소하기 위한 DB SELECT 조회"

# =============================================================================
# 실행 단계별 계약
# =============================================================================
commands:

  analyze:
    purpose: "Prep의 PPT를 읽어 people_spec(original), machine_spec(original), people_spec(final)을 생성"
    start_condition:
      required_state: ["idle", "task_prepared"]
      required_files:
        - "work/task/1.Prep/*.pptx"
    inputs:
      required:
        - "work/task/1.Prep/*.pptx"
      optional:
        - "system/config/framework_manifest.yml"
        - "system/config/naming.yml"
        - "system/cache/convention/**"
      readable:
        - "system/**"
        - "work/task/1.Prep/**"
      writable:
        - "work/task/2.Working/**"
        - "work/.active_context.yml"
        - "work/.lock"
      forbidden:
        - "work/fix/**"
        - "archive/**"
        - "system/templates/skeletons/**"
    outputs:
      intermediate:
        - "work/task/2.Working/extracted/**"
        - "work/task/2.Working/classified/**"
      required:
        - "work/task/2.Working/original/people_spec.md"
        - "work/task/2.Working/original/machine_spec.yml"
        - "work/task/2.Working/final/people_spec.md"
        - "work/task/2.Working/manifests/analyze.manifest.yml"
    success_state: "task_analyzed"
    failure_state: "failed"
    next_command: "build (사용자가 final/people_spec.md 검토/수정 후 실행)"

  build:
    purpose: "review skill로 final/machine_spec.yml을 확정한 뒤, generate skill로 코드 산출물을 생성하고, 선택적으로 deploy 준비를 수행"
    start_condition:
      required_state: ["task_analyzed"]
      required_files:
        - "work/task/2.Working/original/people_spec.md"
        - "work/task/2.Working/original/machine_spec.yml"
        - "work/task/2.Working/final/people_spec.md"
        - "work/task/2.Working/manifests/analyze.manifest.yml"
    skills_used:
      - name: "review"
        file: ".claude/skills/review.md"
        purpose: "original vs final people_spec diff → final/machine_spec.yml 생성"
        order: 1
      - name: "generate"
        file: ".claude/skills/generate.md"
        purpose: "final/machine_spec.yml → skeleton 기반 코드 생성"
        order: 2
      - name: "deploy"
        file: ".claude/skills/deploy.md"
        purpose: "deliverables → target path 계산 및 자동 배포 (apply 기본)"
        order: 3
        optional: false
        condition: "verify_result.status가 pass 또는 warn이고 deliverables 존재 시"
        default_mode: "apply"
        auto_trigger: true
    inputs:
      required:
        - "work/task/2.Working/original/people_spec.md"
        - "work/task/2.Working/original/machine_spec.yml"
        - "work/task/2.Working/final/people_spec.md"
      optional:
        - "system/cache/convention/**"
      readable:
        - "system/**"
        - "work/task/**"
      writable:
        - "work/task/2.Working/final/**"
        - "work/task/2.Working/mapped/**"
        - "work/task/2.Working/generated/**"
        - "work/task/2.Working/manifests/**"
        - "work/task/3.Result/**"
        - "work/.active_context.yml"
        - "work/.lock"
      forbidden:
        - "work/fix/**"
        - "archive/**"
    outputs:
      intermediate:
        - "work/task/2.Working/final/machine_spec.yml"
        - "work/task/2.Working/mapped/**"
        - "work/task/2.Working/generated/**"
      required:
        - "work/task/2.Working/final/machine_spec.yml"
        - "work/task/2.Working/manifests/build.manifest.yml"
        - "work/task/2.Working/manifests/verify_result.yml"
        - "work/task/3.Result/deliverables/**"
        - "work/task/3.Result/report/**"
      optional:
        - "work/task/3.Result/report/deploy_summary.yml"
    success_state: "task_built"
    failure_state: "failed"
    deploy_policy:
      description: "build 마지막에 자동으로 deploy apply 수행. deploy 실패는 build 실패가 아님"
      default_mode: "apply"
      entry_condition: "verify_result.status in [pass, warn] AND deliverables 존재"
      auto_trigger: true
    next_command: "fix (문제 발견 시) 또는 clean (완료 시)"

  fix:
    purpose: "fix 요청을 분석하여 영향 범위 판정 후 재분석/재생성/패치를 수행"
    parameters:
      policy_only:
        description: "--policy-only: 산출물 수정 없이 원인 분석 + 정책 보강만 수행"
        default: false
        effects:
          - "work/** 산출물 수정 금지"
          - "deliverables 생성 금지"
          - "deploy 생략"
          - "phase 변경 없음 (fix_applied로 전이하지 않음)"
          - "system/policies/**, system/templates/** 수정 허용"
          - "fix.manifest.yml만 기록 (mode: policy_only)"
        allowed_states: ["task_built", "fix_applied"]
    start_condition:
      required_state: ["task_built"]
      required_state_policy_only: ["task_built", "fix_applied"]
      required_files:
        - "work/fix/1.Prep/*"
    inputs:
      required:
        - "work/fix/1.Prep/*"
      optional:
        - "work/task/2.Working/**"
        - "work/task/3.Result/**"
      readable:
        - "system/**"
        - "work/task/**"
        - "work/fix/**"
      writable:
        - "work/fix/2.Working/**"
        - "work/fix/3.Result/**"
        - "work/.active_context.yml"
        - "work/.lock"
      forbidden:
        - "archive/**"
    task_reference_policy:
      description: "fix는 task 산출물을 읽기 전용으로 참조 가능 (원본 수정 금지)"
      readable: ["work/task/2.Working/**", "work/task/3.Result/**"]
      writable_in_task: false
    outputs:
      required:
        - "work/fix/2.Working/manifests/fix.manifest.yml"
        - "work/fix/2.Working/manifests/verify_result.yml"
        - "work/fix/3.Result/deliverables/**"
        - "work/fix/3.Result/report/**"
    deploy_policy:
      description: "fix 완료 후 자동으로 deploy apply 수행. deploy 실패는 fix 실패가 아님"
      default_mode: "apply"
      entry_condition: "verify_result.status in [pass, warn] AND fix deliverables 존재"
      auto_trigger: true
    success_state: "fix_applied"
    failure_state: "failed"
    next_command: "clean (완료 시) 또는 fix (추가 수정 시)"

  cache-refresh:
    purpose: "convention cache를 DB에서 최신 데이터로 갱신"
    start_condition:
      required_state: ["idle", "task_prepared", "task_analyzed", "task_built", "fix_applied", "failed"]
      description: "어떤 phase에서든 실행 가능. phase 변경 없음."
    inputs:
      required:
        - "system/cache/convention/sql/*.sql"
      readable:
        - "system/policies/runtime/db_access.yml"
        - "system/cache/convention/**"
      writable:
        - "system/cache/convention/*.txt"
        - "work/.lock"
    outputs:
      required:
        - "system/cache/convention/code.txt"
        - "system/cache/convention/table.txt"
        - "system/cache/convention/view.txt"
        - "system/cache/convention/function.txt"
        - "system/cache/convention/trigger.txt"
    success_state: null
    failure_state: null
    note: "phase를 변경하지 않음. lock만 사용."

  clean:
    purpose: "work 전체를 archive로 이동하고 active context 초기화"
    start_condition:
      required_state: ["idle", "task_prepared", "task_analyzed", "task_built", "fix_prepared", "fix_analyzed", "fix_applied", "failed"]
      description: "어떤 phase에서든 실행 가능. idle/task_prepared에서는 work에 내용이 있을 때만 archive 수행."
    inputs:
      required:
        - "work/**"
      readable:
        - "work/**"
      writable:
        - "work/**"
        - "archive/**"
    action: "archive_then_reset"
    steps:
      - "work 하위 전체를 archive/work_{timestamp}/ 로 이동"
      - "work/.active_context.yml 초기화"
      - "work/.lock → UNLOCKED"
    success_state: "idle"
    failure_state: "failed"

# =============================================================================
# 상태 전이 모델
# =============================================================================
# task_reviewed 상태 제거됨. build가 task_analyzed에서 직접 시작하며,
# 내부적으로 review skill을 호출하여 final/machine_spec.yml을 생성한다.
#
# 흐름: analyze → (사용자 검토) → build(review+generate) → fix → clean
#
state_machine:
  states:
    idle:
      description: "초기 상태. 작업 없음"
      entry_condition: "clean 완료 또는 최초 상태"
      allowed_commands: ["analyze", "clean"]
      next_on_success: "task_prepared"
      next_on_error: "failed"

    task_prepared:
      description: "Prep 파일 준비 완료"
      entry_condition: "1.Prep에 PPT 파일 배치"
      allowed_commands: ["analyze", "clean"]
      next_on_success: "task_analyzed"
      next_on_error: "failed"

    task_analyzed:
      description: "analyze 완료. people_spec/machine_spec 생성됨. 사용자가 final/people_spec.md를 검토/수정 후 /build 실행"
      entry_condition: "analyze 성공 (analyze.manifest.yml 존재)"
      allowed_commands: ["build", "clean"]
      allowed_inputs: ["사용자가 final/people_spec.md 수정"]
      next_on_success: "task_built (via /build)"
      next_on_error: "failed"

    task_built:
      description: "build 완료. final/machine_spec.yml 확정 + 코드 산출물 생성됨"
      entry_condition: "build 성공 (build.manifest.yml + verify_result.yml 존재)"
      allowed_commands: ["fix", "clean"]
      next_on_success: "fix_applied 또는 cleaned"
      next_on_error: "failed"

    fix_prepared:
      description: "fix 요청 파일 준비 완료"
      entry_condition: "fix/1.Prep에 fix 요청 파일 배치"
      allowed_commands: ["fix", "clean"]
      next_on_success: "fix_analyzed"
      next_on_error: "failed"

    fix_analyzed:
      description: "fix 영향 분석 완료"
      entry_condition: "fix 영향 분석 성공"
      allowed_commands: ["fix", "clean"]
      next_on_success: "fix_applied"
      next_on_error: "failed"

    fix_applied:
      description: "fix 적용 완료"
      entry_condition: "fix 성공 (fix.manifest.yml + verify_result.yml 존재)"
      allowed_commands: ["fix", "clean"]
      next_on_success: "fix_applied 또는 cleaned"
      next_on_error: "failed"

    cleaned:
      description: "clean 완료. work가 archive로 이동됨"
      entry_condition: "clean 성공"
      allowed_commands: ["analyze"]
      note: "cleaned 상태는 idle과 동일하게 취급"

    failed:
      description: "실행 실패"
      entry_condition: "어떤 command든 실패 시"
      allowed_commands: ["clean"]
      retry_policy: "clean 후 처음부터 재시작. 동일 상태에서 재시도 금지"
      note: "failed에서 빠져나오려면 반드시 clean 수행"
