version: 1
id: spec_generation
description: "PPT에서 people_spec/machine_spec 생성 시 규칙 — 추출 원칙, 미확정 처리, 태그, cache 연계"

# Spec 생성 규칙
# analyze.md에서 승격

people_spec_rules:
  id: SPG-001
  description: "people_spec(original) 생성 규칙"
  template: "system/templates/spec/people_spec.md"
  content_rules:
    - "PPT에서 추출한 화면 개요, 조회 조건, 그리드 컬럼, 버튼, 비즈니스 규칙을 채운다"
    - "미확인 항목은 '미확정 항목' 섹션에 기록한다"
    - "PPT 원문을 최대한 보존하되, 프레임워크 용어로 정규화한다"
  tag_rules:
    reference: "system/policies/analyze/default_resolution.yml"
    description: "보완 시 태그 규칙은 default_resolution.yml의 tagging_rules를 따른다"
  field_rules:
    - "search/form 테이블의 row, col_order, gravity 필수"
    - "row 전체 gravity 합 = 5"
    - "빈 칸은 {} 로 채움"

machine_spec_rules:
  id: SPG-002
  description: "machine_spec(original) 생성 규칙"
  template: "system/templates/spec/machine_spec.yml"
  content_rules:
    - "naming.yml 규칙에 따라 screen_id, module_id, mapper_namespace 결정"
    - "template_selection.yml에 따라 skeleton_choice 결정"
    - "PPT에서 확인 가능한 placeholder 채움"
    - "불가 항목은 unresolved에 기록"
  cache_enrichment:
    description: "convention cache를 참조하여 정보 보강"
    rules:
      - "table.txt로 테이블/컬럼명 확정 → unresolved 감소"
      - "code.txt로 코드 정의 확인 → 코드콤보/코드헬프 매핑"
      - "function.txt로 함수 참조 확인"
      - "cache에 없는 항목은 DB fallback 결과 활용"
    reference: "system/policies/runtime/db_access.yml"
  schema_validation: "system/schemas/machine_spec.schema.json"

final_people_spec:
  id: SPG-003
  description: "people_spec(final) 초기 생성 규칙"
  rule: "original/people_spec.md를 final/people_spec.md로 복사. 이 파일이 사용자 검토/수정 대상."

unresolved_handling:
  id: SPG-004
  description: "미확정 항목 처리 규칙"
  reference: "system/policies/runtime/lifecycle.yml → unresolved_policy"
  rules:
    - "analyze: unresolved 있어도 완료 가능. people_spec에 미확정 표시"
    - "build: unresolved 있으면 차단. 사용자 확인 후 진행"
    - "fix: unresolved 있으면 차단. 추가 정보 요청"

screen_classification:
  id: SPG-005
  description: "PPT 슬라이드 → 화면 분류 규칙"
  procedure:
    - "PPT 슬라이드별 내용 추출 → extracted/"
    - "화면 후보 식별"
    - "screen_type 분류 (screen-types/*.yml + screen_type_rules.yml 기준)"
    - "분류 결과 → classified/"
  references:
    - "system/templates/screen-types/*.yml"
    - "system/policies/analyze/screen_type_rules.yml"
    - "system/policies/analyze/ppt_extraction.yml"
    - "system/policies/analyze/classify_tags.yml"
