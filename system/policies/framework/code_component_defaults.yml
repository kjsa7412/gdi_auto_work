version: 1
id: code_component_defaults
description: "코드콤보/코드헬프 컬럼 기본값, DATA_VIEW/DATA_CODE_TYPE 상수, elements 직접 선언 원칙"

# 코드 컴포넌트 기본값 규칙
# v5 generate.md에서 이관

code_combo:
  id: CC-001
  description: "코드콤보 기본 패턴"
  default_pattern:
    view: "DATA_VIEW.codeNone"
    type: "DATA_CODE_TYPE.codeValue"
    label: "코드명"
    name: "P_field_cd"
    param:
      wrk_tp_cd: "XX"
      cd_tp_cd: "YYY"
  rules:
    - "코드콤보는 elements 배열에 직접 선언 (외부 참조 금지)"
    - "APP_CODE.load() 호출 금지 — elements > type 선언으로 대체"
    - "wrk_tp_cd, cd_tp_cd는 convention cache code.txt에서 확인하여 실제 값 사용"

code_help:
  id: CC-002
  description: "코드헬프/코드콤보 기본 패턴"
  default_rule: >
    view는 항상 DATA_VIEW.codeNone을 사용한다. DATA_VIEW.code는 사용하지 않는다.
    type은 뒤에 오는 DATA_CODE_TYPE과 관계없이 view는 항상 codeNone이다.
  default_view: "DATA_VIEW.codeNone"
  default_type: "DATA_CODE_TYPE.codeValue"
  forbidden_view: "DATA_VIEW.code — 사용 금지. 항상 DATA_VIEW.codeNone으로 대체"
  rules:
    - "view는 항상 DATA_VIEW.codeNone (type이 codeValue든 custom이든 무관)"
    - "기본 코드콤보: view: DATA_VIEW.codeNone, type: DATA_CODE_TYPE.codeValue"
    - "커스텀 코드헬프: view: DATA_VIEW.codeNone, type: DATA_CODE_TYPE.custom + statement + idField + valueField 필수"
    - "DATA_VIEW.code 사용 금지"
    - "DATA_CODE_TYPE.custom 사용 시 idField, valueField 반드시 지정 (프레임워크 webix.custom3.js 검증 통과 필수)"
  custom_code_help_sql:
    description: "커스텀 코드헬프의 조회 SQL 위치 규칙"
    location: "src/main/resources/mapper/sjerp/help/codeCustomMapper.xml"
    namespace: "codeCustom"
    rules:
      - "커스텀 코드헬프(DATA_CODE_TYPE.custom)의 statement SQL은 반드시 codeCustomMapper.xml에 배치"
      - "개별 화면의 XML mapper에 커스텀 코드헬프 SQL을 배치하지 않음"
      - "statement 형식: codeCustom.{sqlId} (예: codeCustom.selectRschPrjList)"
    근거: "프레임워크 help 폴더 구조 분석 (2026-04-09)"

data_view_constants:
  id: CC-003
  description: "DATA_VIEW 상수 목록"
  values:
    - "DATA_VIEW.code — 코드헬프 팝업"
    - "DATA_VIEW.codeNone — 코드콤보 (팝업 없이 드롭다운)"
    - "DATA_VIEW.user — 사용자 검색"
    - "DATA_VIEW.dept — 부서 검색"
    - "DATA_VIEW.style — 스타일 검색"
  rule: "DATA_VIEW 상수만 사용. 문자열 직접 입력 금지."

data_code_type_constants:
  id: CC-004
  description: "DATA_CODE_TYPE 상수 목록"
  values:
    - "DATA_CODE_TYPE.code — 코드 검색 (코드헬프용)"
    - "DATA_CODE_TYPE.codeValue — 코드 드롭다운 (코드콤보용)"
    - "DATA_CODE_TYPE.user — 사용자 검색"
    - "DATA_CODE_TYPE.dept — 부서 검색"
    - "DATA_CODE_TYPE.style — 스타일 검색"
  rule: "DATA_CODE_TYPE 상수만 사용. 문자열 직접 입력 금지."

grid_code_help:
  id: CC-005
  description: "그리드 코드헬프 컬럼 기본 패턴"
  rules:
    - "그리드 컬럼에 코드헬프 필요 시 editor: GRID_VIEW.code 사용"
    - "GRID_VIEW.text 사용 금지 (코드헬프가 필요한 컬럼에)"
    - "type: DATA_CODE_TYPE.{적절한 타입} 지정 필수"
    - "targetCols: 선택 시 자동 채움할 컬럼 매핑 필수"
  default_grid_pattern:
    editor: "GRID_VIEW.code"
    type: "DATA_CODE_TYPE.code"
    targetCols: ["연관컬럼 자동 매핑"]

dependency_pattern:
  id: CC-006
  description: "코드콤보 의존성(부모-자식) 패턴"
  parent:
    depElement: ["child_cd"]
    description: "부모 변경 시 자식 코드 목록 갱신"
  child:
    refElement:
      - name: "parent_cd"
        field: "rel_comm_cd"
    description: "부모 코드값을 참조하여 필터링"

file_component:
  id: CC-008
  description: "파일 컴포넌트 기본 패턴"
  single:
    view: "DATA_VIEW.file"
    default_props: ["name", "label"]
    optional_props: ["required", "isUpload", "isImage", "accept", "height", "isList", "imageHeight", "imageClick", "onBeforeUploadSetParam"]
  multi:
    view: "DATA_VIEW.fileMulti"
    default_props: ["name", "label", "gravity"]
    optional_props: ["required", "isUpload", "listHeight", "listAutoHeight"]
  default_selection: "DATA_VIEW.fileMulti"
  rules:
    - "별도 지시가 없는 한 기본적으로 DATA_VIEW.fileMulti (멀티 업로드)를 사용"
    - "명시적으로 단건 파일만 허용하는 경우에만 DATA_VIEW.file 사용"
    - "조회 전용이면 isUpload: false"
    - "fileMulti는 gravity: 2 이상 권장"
    - "저장 시 saveFile() 호출 후 callback에서 file_id로 데이터 저장"
  근거: "SYY046.html, 사용자 지시 (2026-04-09)"

grid_column_width:
  id: CC-009
  description: "그리드 컬럼 너비 기본값 규칙"
  rule: >
    PPT에서 별도의 컬럼 너비 지정이 없는 경우, 그리드 컬럼은 균등분배를 기본으로 한다.
    모든 컬럼에 fillspace: true를 설정하여 동일 너비로 분배한다.
    단, 다음 경우는 width 고정 허용:
    - 체크박스 컬럼 (width: 50)
    - 행번호 컬럼 (width: 60)
    - 코드값 등 짧은 데이터 (width: 80~100)
    - PPT에서 명확히 너비가 다른 컬럼
  severity: critical

elements_declaration:
  id: CC-007
  description: "elements 직접 선언 원칙"
  rule: >
    코드콤보/코드헬프는 반드시 해당 form 또는 grid의 elements/columns 배열 내에
    직접 선언한다. 외부 함수 호출(APP_CODE.load 등)로 동적 로딩하지 않는다.
  reason: "skeleton 기반 생성 원칙 유지. 외부 호출은 runtime 의존성을 만들어 검증 불가."
