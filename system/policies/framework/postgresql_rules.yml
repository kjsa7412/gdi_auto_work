version: 1
id: postgresql_rules
description: "PostgreSQL 생성 시 금지 패턴, 허용 대체 패턴, 자동 교정 가능 여부"

# PostgreSQL 생성 규칙
# v5 generate.md에서 이관

forbidden_patterns:

  window_in_aggregate:
    id: PG-001
    description: "집계함수 내 윈도우함수 금지"
    severity: critical
    forbidden: "STRING_AGG(... COUNT(*) OVER(...) ...)"
    error: "집계함수(STRING_AGG 등) 안에서 윈도우함수(OVER 절) 사용 불가"
    correct_alternative: |
      서브쿼리에서 GROUP BY로 집계한 후 외부에서 STRING_AGG 사용:
      SELECT STRING_AGG(sub.name || '(' || sub.cnt || ')', ', ')
      FROM (
          SELECT type, name, COUNT(*) AS cnt
          FROM ...
          GROUP BY type, name
      ) sub
    auto_fixable: false
    action: "수동 확인 필요 — 서브쿼리 구조로 재작성"

  nested_aggregates:
    id: PG-002
    description: "집계함수 중첩 금지"
    severity: critical
    forbidden: "SUM(COUNT(...))"
    error: "집계함수 안에 집계함수 중첩 불가"
    correct_alternative: |
      서브쿼리에서 COUNT 수행 후 외부에서 SUM:
      SELECT SUM(sub.cnt)
      FROM (
          SELECT category, COUNT(*) AS cnt
          FROM ...
          GROUP BY category
      ) sub
    auto_fixable: false
    action: "수동 확인 필요 — 서브쿼리 구조로 재작성"

  string_agg_subquery_distinct:
    id: PG-003
    description: "STRING_AGG + 서브쿼리 + DISTINCT 금지 패턴"
    severity: critical
    forbidden: "STRING_AGG(DISTINCT (SELECT ...))"
    error: "STRING_AGG에 DISTINCT와 서브쿼리 동시 사용 불가"
    correct_alternative: |
      JOIN으로 서브쿼리 대체하거나, 내부 서브쿼리에서 DISTINCT 처리:
      SELECT STRING_AGG(DISTINCT t2.name, ', ')
      FROM main_table t1
      JOIN ref_table t2 ON t1.ref_id = t2.id
    auto_fixable: false
    action: "수동 확인 필요 — JOIN 구조로 재작성"

auto_correction_rules:
  id: PG-004
  description: "자동 교정 가능한 PostgreSQL 패턴"
  corrections:
    - pattern: "now()"
      replacement: "current_timestamp"
      auto_fixable: true
    - pattern: "resultType=\"map\""
      replacement: "resultType=\"java.util.Map\""
      auto_fixable: true
      note: "XML mapper 내 MyBatis resultType"
    - pattern: "_dtm 접미사"
      replacement: "_dts 접미사"
      auto_fixable: true
    - pattern: "namespace 대문자"
      replacement: "namespace 소문자"
      auto_fixable: true

verify_integration:
  description: "xml_checks.yml 및 sql_checks.yml과 연계하여 검증"
  related_policies:
    - "system/policies/verify/xml_checks.yml"
    - "system/policies/verify/sql_checks.yml"
