version: 1
id: html_checks
description: "HTML 산출물 검증 규칙 — IIFE, PGM, fragment, 버튼 매핑, 코드콤보, 그리드 이벤트 등"

# HTML 검증 규칙
# v5 generate.md Integrated Verify에서 이관

checks:

  # === CRITICAL (fail if not passed) ===

  iife_pattern:
    id: HC-001
    severity: critical
    description: "IIFE 패턴 필수"
    rule: "HTML 파일의 script 블록은 (() => { ... })() 패턴으로 감싸야 한다"
    pattern: "(() => {"

  pgm_variable:
    id: HC-002
    severity: critical
    description: "PGM 변수 선언 필수"
    rule: "const PGM = /*[[${PGM}]]*/ null; 선언 필수"
    pattern: "const PGM = /*[[${PGM}]]*/ null;"

  listener_init:
    id: HC-003
    severity: critical
    description: "listener 초기화 필수"
    rule: "const listener = platform.listener[PGM]; 선언 필수"
    pattern: "const listener = platform.listener[PGM];"

  init_pgm_exists:
    id: HC-004
    severity: critical
    description: "initPgm 함수 존재 필수"
    rule: "initPgm 함수가 정의되어 있어야 한다"

  active_pgm_exists:
    id: HC-005
    severity: critical
    description: "activePgm 함수 존재 필수"
    rule: "activePgm(param, isNew) 함수가 정의되어 있어야 한다"

  forbidden_api_not_used:
    id: HC-006
    severity: critical
    description: "금지 API 미사용 확인"
    rule: "forbidden_apis.yml에 정의된 금지 패턴이 사용되지 않았는지 확인"
    reference: "system/policies/framework/forbidden_apis.yml"
    verification_method: |
      반드시 생성된 HTML 파일의 실제 내용을 문자열 검색하여 검증한다.
      형식적 pass 금지 — 아래 패턴이 하나라도 발견되면 critical fail:
      1. "platform.alert(" — popup.alert.show 사용해야 함
      2. "platform.confirm(" — popup.confirm.show 사용해야 함
      3. "platform.dataSearchForm(" — webix.ui + listener.form 사용해야 함
      4. "platform.dataForm(" — webix.ui + listener.form 사용해야 함
      5. "platform.dataGrid(" — webix.ui + listener.grid 사용해야 함
      6. "platform.dataToolbar(" — webix.ui + listener.toolbar 사용해야 함
      7. "platform.getSearchFormParam(" — listener.form.searchForm.getData() 사용해야 함
      8. "platform.getFormValues(" — listener.form.xxx.getData() 사용해야 함
      9. "platform.setFormValues(" — listener.form.xxx.setData() 사용해야 함
      10. "platform.setGridData(" — listener.grid.xxx.setData() 사용해야 함
      탐지 정규식: /platform\\.(?!post|url|listener)[a-zA-Z]+\(/
      이 정규식에 매치되면 hallucinated API 사용으로 판정.

  correct_api_used:
    id: HC-007
    severity: critical
    description: "올바른 API 사용 확인"
    checks:
      - "APP_PGM.openPgm() 사용 (platform.openPgm 금지)"
      - "APP_PGM.closePgm() 사용 (platform.closePgm 금지)"
      - "popup.alert.show() 사용 (platform.alert 금지)"
      - "popup.confirm.show() 사용 (platform.confirm 금지)"
      - "listener.grid.xxx.getCheckedData() 사용 (platform.getCheckedGridData 금지)"
      - "listener.form.xxx.setReadonly() 사용 (platform.setFormReadonly 금지)"
      - "listener.form.xxx = webix.ui({...}) 사용 (platform.dataForm 금지)"
      - "listener.grid.xxx = webix.ui({...}) 사용 (platform.dataGrid 금지)"
      - "new Callback(function(result){...}) 사용 (bare function callback 금지)"
    verification_method: |
      생성된 HTML 파일에서 다음 패턴이 존재하는지 실제 확인한다:
      - "listener.form." 또는 "listener.grid." 또는 "listener.toolbar." 로 시작하는 webix.ui 할당이 있는가
      - platform.post 호출에 "new Callback" 패턴이 사용되었는가
      - alert/confirm이 "popup.alert.show" / "popup.confirm.show" 형태인가

  button_mapping:
    id: HC-008
    severity: critical
    description: "버튼 매핑 정확성"
    rule: "button_mapping.yml의 표준 버튼 → 올바른 listener 경로 매핑 확인"
    reference: "system/policies/framework/button_mapping.yml"

  etc_listener_format:
    id: HC-009
    severity: critical
    description: "etc{N} listener 형식"
    correct: "listener.button.etc{N}.click"
    wrong: "listener.button.etc_desc{N}.click"
    auto_fixable: true

  webix_ui_usage:
    id: HC-010
    severity: critical
    description: "webix.ui 사용 필수"
    rule: "form, grid, layout 등은 webix.ui() 호출로 생성해야 한다"

  fragment_include:
    id: HC-011
    severity: critical
    description: "fragment include 방식"
    rule: "th:block th:replace 형식 사용"
    pattern: "th:block th:replace"

  dynamic_id:
    id: HC-012
    severity: critical
    description: "동적 ID 규칙"
    rule: "th:id=\"|${PGM}...|\" 형식 사용. 하드코딩 ID 금지"
    pattern: "th:id=\"|${PGM}"

  data_view_constants:
    id: HC-013
    severity: critical
    description: "DATA_VIEW 상수 사용"
    rule: "DATA_VIEW.code, DATA_VIEW.codeNone 등 상수만 사용. 문자열 직접 입력 금지."
    reference: "system/policies/framework/code_component_defaults.yml"

  code_combo_declaration:
    id: HC-014
    severity: critical
    description: "코드콤보 elements 직접 선언"
    rule: "코드콤보는 elements 배열에 직접 선언. APP_CODE.load() 호출 금지."
    reference: "system/policies/framework/code_component_defaults.yml"

  editor_change_name:
    id: HC-015
    severity: critical
    description: "editor.change 이벤트에서 el.config.name 사용"
    rule: "에디터 변경 이벤트 핸들러에서 el.config.name으로 필드 식별"

  subscreen_navigation:
    id: HC-016
    severity: critical
    description: "서브화면 네비게이션"
    rule: "그리드 더블클릭으로 서브화면 이동 시 gridRow.dblclick 사용"
    pattern: "listener.gridRow.dblclick"

  empty_result_handling:
    id: HC-017
    severity: critical
    description: "조회 결과 0건 처리"
    rule: "API 반환 결과가 0건일 때 undefined 오류 방지 및 안내 메시지 표시"

  grid_code_help_column:
    id: HC-018
    severity: critical
    description: "그리드 코드헬프 컬럼 검증"
    rule: "코드헬프 필요 컬럼은 editor: GRID_VIEW.code 사용. GRID_VIEW.text 사용 금지."
    reference: "system/policies/framework/code_component_defaults.yml"

  section_label_toolbar_match:
    id: HC-019
    severity: critical
    description: "PPT ▶ 섹션 라벨 수 = HTML dataToolbar 수 정확 일치 검증 (PP-20260413-009)"
    rule: >
      PPT classified JSON의 section_labels 배열 항목 수와
      생성된 HTML의 dataToolbar 생성 수가 정확히 일치해야 한다.
      누락(HTML < PPT)과 과잉(HTML > PPT) 모두 위반이다.
    check_method: >
      1. classified JSON의 section_labels 배열 길이 확인
      2. 생성된 HTML에서 'dataToolbar' 문자열 출현 횟수 확인
      3. PPT수 > HTML수: critical fail (섹션 누락 — 예: 첨부파일 독립 섹션 누락)
      4. PPT수 < HTML수: critical fail (과잉 분리 — 예: PPT에 없는 toolbar 추가)
      5. 수 일치 시: 각 toolbar의 title이 PPT ▶ 라벨 원문과 일치하는지 추가 확인
    exceptions:
      - "list 화면의 searchForm 영역은 toolbar 아닌 dataForm(search:true)으로 생성하므로 toolbar 수에서 제외"
    reference: "system/policies/framework/layout_rules.yml LR-012"

  file_section_independence:
    id: HC-020
    severity: critical
    description: "첨부파일 독립 섹션 검증 (PP-20260413-009)"
    rule: >
      PPT section_labels에 '첨부' 또는 '파일' 키워드가 포함된 ▶ 라벨이 있으면,
      HTML에 별도 fileForm이 존재해야 한다. postForm 내부에 fileMulti가 있으면 안 된다.
    check_method: >
      1. PPT section_labels에서 첨부파일 관련 라벨 존재 확인
      2. HTML에서 listener.form.fileForm 존재 확인
      3. 존재하지 않으면 critical fail
    reference: "system/policies/framework/html_patterns.yml FC-001, layout_rules.yml LR-013"

  # === WARNING ===

  reset_state:
    id: HC-W01
    severity: warning
    description: "resetState() 존재 확인"
    rule: "화면 초기화 함수 존재 권장"

  css_alignment:
    id: HC-W02
    severity: warning
    description: "CSS 정렬 규칙 준수"
    rule: "layout_rules.yml의 CSS 클래스 규칙 준수 여부"
    reference: "system/policies/framework/layout_rules.yml"

  code_combo_self_ref:
    id: HC-W03
    severity: warning
    description: "코드콤보 refElement 자기참조 금지"
    rule: "refElement에서 자기 자신을 참조하지 않는지 확인"
