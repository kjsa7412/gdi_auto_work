version: 1
id: self_diagnosis
description: "자기진단 규칙 — DDL 미존재 컬럼, 미등록 코드, 불명확 항목, 자동/수동 수정 구분"

# 자기진단 규칙
# v5 generate.md Integrated Verify에서 이관

diagnosis_rules:

  ddl_missing_column:
    id: SD-001
    description: "DDL 미존재 컬럼 사용 시 DDL보완 SQL 제안"
    trigger: "XML SQL에서 사용하는 컬럼이 convention cache table.txt에 없을 때"
    action:
      auto: "DDL보완 SQL ({screenId}_DDL보완.sql) 자동 생성"
      manual_check: "컬럼 타입/크기 추정이 불확실하면 [사용자 확인 필요] 태그"
    severity: critical
    reference: "system/policies/framework/sql_generation.yml"

  unregistered_code:
    id: SD-002
    description: "미등록 코드 발견 시 코드등록 SQL 제안"
    trigger: "machine_spec에서 사용하는 코드가 convention cache code.txt에 없을 때"
    action:
      auto: "코드등록 SQL ({screenId}_코드등록.sql) 자동 생성"
      manual_check: "wrk_tp_cd/cd_tp_cd 할당이 불확실하면 [신규코드제안] 태그"
    severity: critical
    reference: "system/policies/framework/code_registration.yml"

  unclear_items:
    id: SD-003
    description: "불명확 항목 경고"
    trigger: "PPT 원문이 모호하거나, 컬럼/코드/이벤트 매핑이 불확실할 때"
    action:
      record: "verify_result.warnings에 불명확 항목 기록"
      tag: "[사용자 확인 필요] 또는 [추론/보완 항목] 태그 부착"
    severity: warning

  auto_vs_manual:
    id: SD-004
    description: "자동 수정 가능 / 불가능 구분"
    auto_fixable:
      - "etc_desc{N}.click → etc{N}.click 교정"
      - "now() → current_timestamp 교정"
      - "resultType=\"map\" → resultType=\"java.util.Map\" 교정"
      - "_dtm → _dts 교정"
      - "namespace 대문자 → 소문자 교정"
    manual_required:
      - "비즈니스 로직 판단이 필요한 항목"
      - "DDL 컬럼 타입 추정이 불확실한 경우"
      - "코드 그룹 할당이 기존 데이터와 충돌 가능한 경우"
      - "PostgreSQL 금지 패턴 재작성 (서브쿼리 구조 변경)"

  sql_artifact_completeness:
    id: SD-006
    description: "SQL 산출물 누락 검출 — 필수 SQL이 모두 생성되었는지 확인"
    trigger: "build generate 완료 후 verify 단계"
    action:
      check_items:
        - "메뉴등록 SQL: 화면이 1개 이상이면 반드시 존재"
        - "DDL보완 SQL: ddl_supplements 항목이 있으면 반드시 존재"
        - "코드등록 SQL: code_registrations 항목이 있으면 반드시 존재"
        - "커스텀 코드헬프 SQL: DATA_CODE_TYPE.custom 사용 화면이 있으면 반드시 존재"
        - "트리거 SQL: description_texts에 트리거/자동 상태변경 요구 시 반드시 존재"
        - "execution_order.md: SQL 파일이 1개 이상이면 반드시 존재"
      on_missing: "critical 오류. 누락된 SQL 파일 즉시 생성 후 재검증"
    severity: critical
    auto_fixable: true
    reference: "system/policies/framework/sql_generation.yml → SG-011"

  hallucination_check:
    id: SD-005
    description: "환각(hallucination) 검출 — PPT 원본과 spec 불일치 탐지"
    trigger: "spec 생성 완료 후 verify 단계"
    action:
      check_items:
        - "그리드 컬럼명이 PPT TABLE 헤더와 1:1 일치하는지 검증"
        - "검색 필드명이 PPT GROUP 라벨과 일치하는지 검증"
        - "spec에 PPT에 없는 컬럼/필드가 추가되지 않았는지 검증"
      on_mismatch: "critical 오류. spec을 PPT 원본 기준으로 교정 필수"
    severity: critical
    auto_fixable: false

result_structure:
  description: "verify_result.yml의 self_diagnosis 섹션 구조"
  fields:
    - name: "ddl_supplements"
      type: "array"
      description: "DDL보완 필요 항목 목록"
    - name: "code_registrations"
      type: "array"
      description: "코드등록 필요 항목 목록"
    - name: "unclear_warnings"
      type: "array"
      description: "불명확 항목 경고 목록"
    - name: "auto_fixed"
      type: "array"
      description: "자동 교정 수행 항목 목록"
    - name: "manual_required"
      type: "array"
      description: "수동 확인 필요 항목 목록"
    - name: "sql_artifacts"
      type: "object"
      description: "SQL 산출물 생성 상태 (SD-006)"
      fields:
        - "menu_registration: {required: bool, generated: bool, path: string}"
        - "ddl_supplement: {required: bool, generated: bool, paths: [string]}"
        - "code_registration: {required: bool, generated: bool, paths: [string]}"
        - "custom_code_help: {required: bool, generated: bool, paths: [string]}"
        - "trigger: {required: bool, generated: bool, paths: [string]}"
        - "execution_order: {required: bool, generated: bool, path: string}"
