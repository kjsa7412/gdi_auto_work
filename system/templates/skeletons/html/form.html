<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{frame/top_title_button :: topTitleButtonFragment}"></th:block>

<div class="data-page">
    <div th:id="|${PGM}searchForm|"></div>
    <div class="data-content-wrapper">
        <div class="data-content-fill">
            <div th:id="|${PGM}mainForm|"></div>
            <!-- OPTIONAL: sub grid section -->
            <div th:id="|${PGM}subGrid|"></div>
        </div>
    </div>
</div>

<script th:inline="javascript">
(function () {
    const PGM = /*[[${PGM}]]*/ null;
    const listener = platform.listener[PGM];

    listener.initPgm = function () {

        /* OPTIONAL: search form for edit mode */
        // === 검색 폼 (수정 대상 조회용) ===
        listener.form.searchForm = webix.ui({
            container: `${PGM}searchForm`,
            view: 'dataForm',
            pgm: PGM,
            search: true,
            elements: [
                {
                    cols: [
                        {{search_fields}}
                    ]
                }
            ]
        });

        // === 메인 입력 폼 ===
        listener.form.mainForm = webix.ui({
            container: `${PGM}mainForm`,
            view: 'dataForm',
            pgm: PGM,
            elements: [
                {
                    cols: [
                        {{detail_fields}}
                    ]
                }
            ]
        });

        /* OPTIONAL: sub grid section start */
        // === 하위 목록 그리드 ===
        listener.grid.subGrid = webix.ui({
            container: `${PGM}subGrid`,
            view: "datagrid",
            listener: listener,
            editable: true,
            checkable: true,
            rowNumber: true,
            addRowable: true,
            columns: [
                {{grid_columns}}
            ]
        });
        /* OPTIONAL: sub grid section end */
    };

    /* OPTIONAL: search for edit mode */
    // === 조회 (수정 모드) ===
    listener.button.search.click = function () {
        if (!listener.form.searchForm.formValidate()) return;

        const param = listener.form.searchForm.getData();
        param.statement = "{{mapper_namespace}}.{{select_sql_id}}";

        const callback = new Callback(function (result) {
            if (result.resultCode === RESULT_CODE.OK && result.resultData) {
                listener.form.mainForm.setData(result.resultData);
            }
        });
        platform.post(platform.url.selectOne, param, callback);
    };

    // === 저장 ===
    listener.button.save.click = function () {
        if (!listener.form.mainForm.formValidate()) return;

        popup.confirm.show("저장 하시겠습니까?", function (confirmYn) {
            if (confirmYn) {
                const formData = listener.form.mainForm.getData();
                formData.statement = "{{mapper_namespace}}.{{insert_sql_id}}";

                const callback = new Callback(function (result) {
                    if (result.resultCode === RESULT_CODE.OK) {
                        popup.alert.show("저장되었습니다.");
                    }
                });
                platform.post(platform.url.save, formData, callback);
            }
        });
    };

    // === 초기화 ===
    listener.button.init.click = function () {
        listener.form.searchForm.init();
        listener.form.mainForm.init();
        /* OPTIONAL: listener.grid.subGrid.setData([]); */
    };

    {{init_script}}

})();
</script>
</html>
